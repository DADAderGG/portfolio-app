<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="投資組合">
<meta name="theme-color" content="#ffffff">
<title>投資組合</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root{
  --bg:#fff;--bg2:#f5f5f7;--bg3:#e5e5ea;
  --text:#1c1c1e;--text2:#6e6e73;--text3:#aeaeb2;
  --border:rgba(0,0,0,0.1);--border2:rgba(0,0,0,0.18);
  --pos:#1D9E75;--neg:#D85A30;--blue:#378ADD;--amber:#EF9F27;
  --radius:14px;--radius-sm:10px;
  --safe-top:env(safe-area-inset-top);--safe-bot:env(safe-area-inset-bottom);
}
@media(prefers-color-scheme:dark){
  :root{--bg:#1c1c1e;--bg2:#2c2c2e;--bg3:#3a3a3c;--text:#fff;--text2:#aeaeb2;--text3:#6e6e73;--border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.2);}
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;background:var(--bg);color:var(--text);padding-top:var(--safe-top);padding-bottom:calc(var(--safe-bot)+72px);}

/* ── Header ── */
.header{padding:16px 16px 12px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--bg);z-index:10;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);}
.header h1{font-size:18px;font-weight:700;}
.hdr-btn{display:flex;align-items:center;gap:4px;padding:7px 12px;border:0.5px solid var(--border2);border-radius:20px;background:transparent;color:var(--text2);font-size:12px;cursor:pointer;}
.hdr-btn:disabled{opacity:.4;}
.spin{display:inline-block;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ── Page switch ── */
.page{display:none;}.page.active{display:block;}

/* ── Total card ── */
.total-card{margin:14px 16px;background:var(--bg2);border-radius:var(--radius);padding:20px;}
.total-label{font-size:12px;color:var(--text2);margin-bottom:4px;}
.total-amount{font-size:34px;font-weight:700;letter-spacing:-1px;margin-bottom:8px;}
.total-row{display:flex;gap:14px;font-size:13px;}
.pos{color:var(--pos);}.neg{color:var(--neg);}

/* ── FX bar ── */
.fx-bar{margin:0 16px 12px;padding:8px 13px;background:var(--bg2);border-radius:var(--radius-sm);display:flex;gap:6px;font-size:12px;color:var(--text2);align-items:center;justify-content:space-between;}
.fx-bar b{color:var(--text);}
.save-status{font-size:11px;color:var(--text3);}
.save-status.saving{color:var(--blue);}.save-status.saved{color:var(--pos);}.save-status.error{color:var(--neg);}

/* ── Chart ── */
.chart-card{margin:0 16px 14px;border:0.5px solid var(--border);border-radius:var(--radius);padding:16px;}
.chart-card h3{font-size:12px;color:var(--text2);margin-bottom:12px;font-weight:500;}

/* ── Tabs ── */
.tabs{display:flex;margin:0 16px 12px;background:var(--bg2);border-radius:var(--radius-sm);padding:3px;gap:2px;}
.tab{flex:1;padding:7px 4px;font-size:12px;font-weight:600;border:none;background:transparent;color:var(--text2);border-radius:8px;cursor:pointer;transition:all .15s;}
.tab.active{background:var(--bg);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.12);}
.section{display:none;}.section.active{display:block;}
.section-sum{margin:0 16px;padding:10px 0;font-size:12px;color:var(--text2);display:flex;justify-content:space-between;border-bottom:0.5px solid var(--border);}
.section-sum b{color:var(--text);}

/* ── Asset list ── */
.asset-list{margin:0 16px;}
.asset-item{display:flex;align-items:center;gap:12px;padding:13px 0;border-bottom:0.5px solid var(--border);}
.asset-item:last-child{border-bottom:none;}
.asset-icon{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;}
.ic-stock{background:#E6F1FB;color:#185FA5;}.ic-us{background:#FBEAF0;color:#993556;}.ic-crypto{background:#FAEEDA;color:#854F0B;}.ic-cash{background:#EAF3DE;color:#3B6D11;}
.asset-info{flex:1;min-width:0;}
.asset-name{font-size:14px;font-weight:600;}
.asset-sub{font-size:11px;color:var(--text2);margin-top:2px;}
.asset-right{text-align:right;flex-shrink:0;}
.asset-price{font-size:11px;color:var(--text2);margin-bottom:1px;}
.asset-val{font-size:14px;font-weight:600;}
.asset-pnl{font-size:11px;margin-top:2px;}
.del-btn{border:none;background:transparent;color:var(--text3);font-size:18px;padding:6px;cursor:pointer;margin-left:2px;line-height:1;}

/* ── Buttons ── */
.btn-add{display:flex;align-items:center;gap:7px;margin:12px 16px;padding:12px 16px;background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius-sm);color:var(--text2);font-size:13px;cursor:pointer;width:calc(100% - 32px);justify-content:center;font-weight:500;}
.export-btn{display:flex;align-items:center;gap:6px;margin:8px 16px 0;padding:11px 16px;background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius-sm);color:var(--text2);font-size:13px;cursor:pointer;width:calc(100% - 32px);justify-content:center;}

/* ── Error bar ── */
.err-bar{margin:0 16px 10px;padding:10px 13px;background:#fdecea;border-radius:var(--radius-sm);font-size:12px;color:#a32d2d;display:none;}

/* ── History page ── */
.hist-summary{margin:14px 16px;display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.hist-card{background:var(--bg2);border-radius:var(--radius-sm);padding:14px;}
.hist-card .lbl{font-size:11px;color:var(--text2);margin-bottom:4px;}
.hist-card .val{font-size:18px;font-weight:700;}
.hist-filter{display:flex;gap:8px;margin:0 16px 12px;overflow-x:auto;padding-bottom:2px;}
.hist-filter::-webkit-scrollbar{display:none;}
.filt-btn{padding:6px 14px;border:0.5px solid var(--border2);border-radius:20px;background:transparent;color:var(--text2);font-size:12px;cursor:pointer;white-space:nowrap;flex-shrink:0;}
.filt-btn.active{background:var(--blue);color:#fff;border-color:var(--blue);}
.hist-list{margin:0 16px;}
.hist-item{padding:14px 0;border-bottom:0.5px solid var(--border);display:flex;align-items:flex-start;gap:12px;}
.hist-item:last-child{border-bottom:none;}
.hist-badge{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;}
.badge-buy{background:#E6F1FB;color:#185FA5;}
.badge-sell{background:#FBEAF0;color:#993556;}
.hist-info{flex:1;min-width:0;}
.hist-title{font-size:14px;font-weight:600;}
.hist-meta{font-size:11px;color:var(--text2);margin-top:3px;line-height:1.5;}
.hist-right{text-align:right;flex-shrink:0;}
.hist-amount{font-size:14px;font-weight:600;}
.hist-pnl{font-size:11px;margin-top:2px;}
.hist-del{border:none;background:transparent;color:var(--text3);font-size:16px;padding:4px;cursor:pointer;margin-left:4px;}
.hist-empty{text-align:center;padding:48px 16px;color:var(--text2);font-size:13px;}

/* ── Modal ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:flex-end;justify-content:center;z-index:200;}
.modal-bg.open{display:flex;}
.modal{background:var(--bg);border-radius:22px 22px 0 0;padding:24px 16px calc(var(--safe-bot)+28px);width:100%;max-height:90vh;overflow-y:auto;}
.modal-handle{width:36px;height:4px;background:var(--bg3);border-radius:2px;margin:0 auto 18px;}
.modal h2{font-size:17px;font-weight:700;margin-bottom:18px;}
.form-group{margin-bottom:14px;}
.form-group label{display:block;font-size:12px;color:var(--text2);margin-bottom:6px;font-weight:500;}
.form-group input,.form-group select{width:100%;padding:12px 14px;border:0.5px solid var(--border2);border-radius:var(--radius-sm);background:var(--bg2);color:var(--text);font-size:16px;-webkit-appearance:none;outline:none;}
.form-group input:focus,.form-group select:focus{border-color:var(--blue);}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.hint{font-size:11px;color:var(--text3);margin-top:4px;}
.btn-row{display:flex;gap:10px;margin-top:18px;}
.btn-primary{flex:1;padding:14px;background:var(--text);color:var(--bg);border:none;border-radius:var(--radius-sm);font-size:16px;font-weight:600;cursor:pointer;}
.btn-cancel{padding:14px 20px;background:transparent;border:0.5px solid var(--border2);border-radius:var(--radius-sm);font-size:16px;cursor:pointer;color:var(--text2);}
.type-toggle{display:flex;gap:0;background:var(--bg2);border-radius:var(--radius-sm);padding:3px;margin-bottom:16px;}
.type-btn{flex:1;padding:9px;font-size:14px;font-weight:600;border:none;background:transparent;color:var(--text2);border-radius:8px;cursor:pointer;}
.type-btn.active.buy{background:#E6F1FB;color:#185FA5;}
.type-btn.active.sell{background:#FBEAF0;color:#993556;}

/* ── Nav ── */
.nav{position:fixed;bottom:0;left:0;right:0;background:var(--bg);border-top:0.5px solid var(--border);display:flex;padding:8px 0 calc(var(--safe-bot)+6px);z-index:10;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 0;border:none;background:transparent;color:var(--text3);font-size:10px;font-weight:500;cursor:pointer;}
.nav-item.active{color:var(--blue);}
.nav-icon{font-size:22px;line-height:1;}

/* ── Loading ── */
.loading-overlay{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:12px;}
.loading-overlay p{color:var(--text2);font-size:14px;}
.empty{text-align:center;padding:32px 16px;color:var(--text2);font-size:13px;}
</style>
</head>
<body>

<div class="loading-overlay" id="loading">
  <div style="font-size:40px">📊</div>
  <p>載入資料中...</p>
</div>

<!-- ════════════════════════════════════
     PAGE: 總覽
════════════════════════════════════ -->
<div id="page-home" class="page active">
  <div class="header">
    <h1>📊 投資組合</h1>
    <button class="hdr-btn" id="sync-btn" onclick="syncPrices()">
      <span id="sync-icon">↻</span><span id="sync-label">更新</span>
    </button>
  </div>

  <div class="total-card">
    <div class="total-label">總資產（TWD）</div>
    <div class="total-amount" id="total-val">NT$ 0</div>
    <div class="total-row">
      <span id="total-pnl" class="pos">損益 NT$ 0</span>
      <span id="total-pct" class="pos">+0.00%</span>
    </div>
  </div>

  <div class="fx-bar">
    <span>💱 USD/TWD <b id="fx-rate">32.50</b> · 🕐 <b id="last-time">—</b></span>
    <span class="save-status" id="save-status">—</span>
  </div>

  <div class="err-bar" id="err-bar"></div>

  <div class="chart-card">
    <h3>資產配置</h3>
    <div style="position:relative;height:160px"><canvas id="pie"></canvas></div>
    <div id="pie-legend" style="display:flex;flex-wrap:wrap;gap:10px;margin-top:12px;font-size:12px;color:var(--text2)"></div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('stocks')">台股</button>
    <button class="tab" onclick="switchTab('us')">美股</button>
    <button class="tab" onclick="switchTab('crypto')">加密幣</button>
    <button class="tab" onclick="switchTab('cash')">現金</button>
  </div>

  <div id="sec-stocks" class="section active">
    <div class="section-sum"><span>台股/ETF 小計</span><b id="sum-stocks">NT$ 0</b></div>
    <div class="asset-list" id="list-stocks"></div>
    <button class="btn-add" onclick="openAssetModal('stocks')">＋ 新增台股 / ETF</button>
  </div>
  <div id="sec-us" class="section">
    <div class="section-sum"><span>美股小計</span><b id="sum-us">$0</b></div>
    <div class="asset-list" id="list-us"></div>
    <button class="btn-add" onclick="openAssetModal('us')">＋ 新增美股（Firstrade）</button>
  </div>
  <div id="sec-crypto" class="section">
    <div class="section-sum"><span>加密貨幣小計</span><b id="sum-crypto">$0</b></div>
    <div class="asset-list" id="list-crypto"></div>
    <button class="btn-add" onclick="openAssetModal('crypto')">＋ 新增加密幣</button>
  </div>
  <div id="sec-cash" class="section">
    <div class="section-sum"><span>現金/存款小計</span><b id="sum-cash">NT$ 0</b></div>
    <div class="asset-list" id="list-cash"></div>
    <button class="btn-add" onclick="openAssetModal('cash')">＋ 新增現金 / 存款</button>
    <button class="export-btn" onclick="exportJSON()">⬇ 匯出 JSON 備份</button>
  </div>
</div>

<!-- ════════════════════════════════════
     PAGE: 歷史紀錄
════════════════════════════════════ -->
<div id="page-history" class="page">
  <div class="header">
    <h1>📋 交易紀錄</h1>
    <button class="hdr-btn" onclick="openTxModal()">＋ 新增</button>
  </div>

  <!-- 損益摘要 -->
  <div class="hist-summary">
    <div class="hist-card">
      <div class="lbl">已實現損益</div>
      <div class="val" id="hist-realized">NT$ 0</div>
    </div>
    <div class="hist-card">
      <div class="lbl">總交易筆數</div>
      <div class="val" id="hist-count">0 筆</div>
    </div>
    <div class="hist-card">
      <div class="lbl">總買入金額</div>
      <div class="val" id="hist-total-buy">NT$ 0</div>
    </div>
    <div class="hist-card">
      <div class="lbl">總賣出金額</div>
      <div class="val" id="hist-total-sell">NT$ 0</div>
    </div>
  </div>

  <!-- 篩選器 -->
  <div class="hist-filter">
    <button class="filt-btn active" onclick="setFilter('all',this)">全部</button>
    <button class="filt-btn" onclick="setFilter('buy',this)">買入</button>
    <button class="filt-btn" onclick="setFilter('sell',this)">賣出</button>
    <button class="filt-btn" onclick="setFilter('stocks',this)">台股</button>
    <button class="filt-btn" onclick="setFilter('us',this)">美股</button>
    <button class="filt-btn" onclick="setFilter('crypto',this)">加密幣</button>
  </div>

  <div class="hist-list" id="hist-list"></div>
</div>

<!-- ════════════════════════════════════
     NAV
════════════════════════════════════ -->
<nav class="nav">
  <button class="nav-item active" id="nav-home" onclick="switchPage('home')">
    <span class="nav-icon">🏠</span>總覽
  </button>
  <button class="nav-item" id="nav-add" onclick="handleNavAdd()">
    <span class="nav-icon">＋</span>新增
  </button>
  <button class="nav-item" id="nav-history" onclick="switchPage('history')">
    <span class="nav-icon">📋</span>歷史
  </button>
  <button class="nav-item" id="nav-refresh" onclick="syncPrices()">
    <span class="nav-icon">↻</span>更新
  </button>
</nav>

<!-- ════════════════════════════════════
     MODAL: 新增持倉
════════════════════════════════════ -->
<div class="modal-bg" id="modal-asset">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2 id="asset-modal-title">新增資產</h2>
    <div class="form-group">
      <label>代號</label>
      <input type="text" id="a-symbol" placeholder="台股:2330  美股:AAPL  加密:BTC" autocapitalize="characters" autocorrect="off">
      <div class="hint" id="a-sym-hint"></div>
    </div>
    <div class="form-group">
      <label>名稱（選填）</label>
      <input type="text" id="a-name" placeholder="例如：台積電">
    </div>
    <div class="form-row">
      <div class="form-group"><label>數量 / 股數</label><input type="number" id="a-qty" placeholder="0" inputmode="decimal" step="any"></div>
      <div class="form-group"><label>平均成本（單價）</label><input type="number" id="a-cost" placeholder="0" inputmode="decimal" step="any"></div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>幣別</label>
        <select id="a-currency">
          <option value="TWD">TWD 台幣</option>
          <option value="USD">USD 美元</option>
          <option value="USDT">USDT</option>
        </select>
      </div>
      <div class="form-group"><label>備註</label><input type="text" id="a-note" placeholder="券商名稱"></div>
    </div>
    <div class="btn-row">
      <button class="btn-cancel" onclick="closeModal('modal-asset')">取消</button>
      <button class="btn-primary" onclick="saveAsset()">儲存</button>
    </div>
  </div>
</div>

<!-- ════════════════════════════════════
     MODAL: 新增交易紀錄
════════════════════════════════════ -->
<div class="modal-bg" id="modal-tx">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2>新增交易紀錄</h2>

    <!-- 買入/賣出切換 -->
    <div class="type-toggle">
      <button class="type-btn buy active" id="tx-buy-btn" onclick="setTxType('buy')">📈 買入</button>
      <button class="type-btn sell" id="tx-sell-btn" onclick="setTxType('sell')">📉 賣出</button>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>類別</label>
        <select id="t-cat">
          <option value="stocks">台股/ETF</option>
          <option value="us">美股</option>
          <option value="crypto">加密幣</option>
          <option value="cash">現金</option>
        </select>
      </div>
      <div class="form-group">
        <label>代號</label>
        <input type="text" id="t-symbol" placeholder="2330 / AAPL / BTC" autocapitalize="characters" autocorrect="off">
      </div>
    </div>
    <div class="form-group">
      <label>名稱（選填）</label>
      <input type="text" id="t-name" placeholder="例如：台積電">
    </div>
    <div class="form-row">
      <div class="form-group"><label>數量</label><input type="number" id="t-qty" placeholder="0" inputmode="decimal" step="any"></div>
      <div class="form-group"><label>單價</label><input type="number" id="t-price" placeholder="0" inputmode="decimal" step="any"></div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>幣別</label>
        <select id="t-currency">
          <option value="TWD">TWD 台幣</option>
          <option value="USD">USD 美元</option>
          <option value="USDT">USDT</option>
        </select>
      </div>
      <div class="form-group">
        <label>交易日期</label>
        <input type="date" id="t-date">
      </div>
    </div>
    <div class="form-group">
      <label>手續費（選填）</label>
      <input type="number" id="t-fee" placeholder="0" inputmode="decimal" step="any">
    </div>
    <div class="form-group">
      <label>備註（選填）</label>
      <input type="text" id="t-note" placeholder="例如：永豐證券">
    </div>
    <div class="btn-row">
      <button class="btn-cancel" onclick="closeModal('modal-tx')">取消</button>
      <button class="btn-primary" onclick="saveTx()">儲存</button>
    </div>
  </div>
</div>

<script>
const API = 'https://portfolio-backend-ophs.onrender.com';
const COLORS = ['#378ADD','#D4537E','#EF9F27','#1D9E75'];
const CAT_NAMES = ['台股/ETF','美股','加密貨幣','現金'];
const TABS = ['stocks','us','crypto','cash'];

let pieChart=null, usdtwd=32.5, prices={}, syncing=false;
let currentTab='stocks', currentPage='home', txType='buy';
let saveTimer=null, histFilter='all';

let pf = {stocks:[],us:[],crypto:[],cash:[]};
let txHistory = []; // [{id,type,cat,symbol,name,qty,price,currency,date,fee,note,pnl}]

// ── Init ──────────────────────────────────────────────
async function init(){
  try{
    const res=await fetch(API+'/portfolio');
    if(res.ok){
      const data=await res.json();
      pf.stocks=data.stocks||[];pf.us=data.us||[];
      pf.crypto=data.crypto||[];pf.cash=data.cash||[];
      txHistory=data.history||[];
      setStatus('saved',data.updated_at?`上次儲存 ${new Date(data.updated_at).toLocaleString('zh-TW',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'})}`:'');
    }
  }catch(e){
    setStatus('error','後端離線，使用本地資料');
    pf.stocks=JSON.parse(localStorage.getItem('pf_stocks')||'[]');
    pf.us=JSON.parse(localStorage.getItem('pf_us')||'[]');
    pf.crypto=JSON.parse(localStorage.getItem('pf_crypto')||'[]');
    pf.cash=JSON.parse(localStorage.getItem('pf_cash')||'[]');
    txHistory=JSON.parse(localStorage.getItem('pf_history')||'[]');
  }
  document.getElementById('loading').style.display='none';
  renderAll();renderHistory();
  syncPrices();
}

// ── Save ──────────────────────────────────────────────
function scheduleSave(){
  ['stocks','us','crypto','cash'].forEach(k=>localStorage.setItem('pf_'+k,JSON.stringify(pf[k])));
  localStorage.setItem('pf_history',JSON.stringify(txHistory));
  setStatus('saving','儲存中...');
  clearTimeout(saveTimer);
  saveTimer=setTimeout(async()=>{
    try{
      const body={...pf,history:txHistory};
      const res=await fetch(API+'/portfolio',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
      await res.json();
      setStatus('saved','✓ 已儲存至雲端');
      setTimeout(()=>setStatus('',''),3000);
    }catch(e){setStatus('error','⚠ 雲端儲存失敗，已存本地');}
  },1000);
}

function setStatus(t,m){const el=document.getElementById('save-status');el.textContent=m;el.className='save-status '+t;}

// ── Export ────────────────────────────────────────────
async function exportJSON(){
  try{
    const res=await fetch(API+'/portfolio/export');
    const data=await res.json();
    const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;
    a.download=`portfolio_${new Date().toISOString().slice(0,10)}.json`;
    a.click();URL.revokeObjectURL(url);
  }catch(e){alert('匯出失敗：'+e.message);}
}

// ── Calc ──────────────────────────────────────────────
function toTWD(val,cur){return(cur==='USD'||cur==='USDT')?val*usdtwd:val;}
function getPrice(sym,cur){
  const s=sym.toUpperCase();
  if(['USDT','USDC','USD','BUSD','DAI'].includes(s))return 1;
  if(cur==='TWD')return prices[s+'.TW']||prices[s]||0;
  return prices[s]||0;
}
function calcAsset(a){
  const isCash=a.cost===1&&['TWD','USD','USDT'].includes(a.symbol.toUpperCase());
  const price=isCash?1:getPrice(a.symbol,a.currency);
  const current=price*a.qty,costTotal=a.cost*a.qty;
  const pnl=current-costTotal,pct=costTotal>0?pnl/costTotal*100:0;
  return{price,current,costTotal,pnl,pct,currentTWD:toTWD(current,a.currency),isCash};
}
const fmtTWD=n=>'NT$ '+Math.round(Math.abs(n)).toLocaleString('zh-TW');
const fmtUSD=n=>'$'+Math.abs(n).toLocaleString('en-US',{maximumFractionDigits:2});
const sign=n=>n>=0?'+':'−';

// ── Render portfolio ──────────────────────────────────
function renderList(type){
  const list=pf[type],el=document.getElementById('list-'+type),sumEl=document.getElementById('sum-'+type);
  const isUS=type==='us',isCrypto=type==='crypto';
  const ic={stocks:'ic-stock',us:'ic-us',crypto:'ic-crypto',cash:'ic-cash'}[type];
  let typeTotal=0;
  if(!list.length){el.innerHTML='<div class="empty">尚未新增資產</div>';sumEl.textContent=isUS||isCrypto?'$0':'NT$ 0';return;}
  el.innerHTML=list.map((a,i)=>{
    const c=calcAsset(a);typeTotal+=c.current;
    const uf=isUS||isCrypto;
    const valStr=uf?fmtUSD(c.current):fmtTWD(c.current);
    const priceStr=c.isCash?'':`<div class="asset-price">現價 ${uf?fmtUSD(c.price):fmtTWD(c.price)}</div>`;
    const pnlStr=c.isCash?'':`<div class="asset-pnl ${c.pnl>=0?'pos':'neg'}">${sign(c.pnl)}${uf?fmtUSD(c.pnl):fmtTWD(c.pnl)} (${sign(c.pct)}${Math.abs(c.pct).toFixed(2)}%)</div>`;
    return`<div class="asset-item">
      <div class="asset-icon ${ic}">${a.symbol.substring(0,3).toUpperCase()}</div>
      <div class="asset-info">
        <div class="asset-name">${a.symbol.toUpperCase()} <span style="font-weight:400;color:var(--text2)">${a.name||''}</span></div>
        <div class="asset-sub">${Number(a.qty).toLocaleString()} 單位 · 成本 ${uf?fmtUSD(a.cost):fmtTWD(a.cost)} · ${a.note||''}</div>
      </div>
      <div class="asset-right">${priceStr}<div class="asset-val">${valStr}</div>${pnlStr}</div>
      <button class="del-btn" onclick="removeAsset('${type}',${i})">✕</button>
    </div>`;
  }).join('');
  sumEl.textContent=isUS||isCrypto?fmtUSD(typeTotal):fmtTWD(typeTotal);
}

function renderTotal(){
  let total=0,cost=0;
  TABS.forEach(t=>pf[t].forEach(a=>{const c=calcAsset(a);total+=toTWD(c.current,a.currency);cost+=toTWD(c.costTotal,a.currency);}));
  const pnl=total-cost,pct=cost>0?pnl/cost*100:0;
  document.getElementById('total-val').textContent='NT$ '+Math.round(total).toLocaleString('zh-TW');
  const pe=document.getElementById('total-pnl');pe.textContent=(pnl>=0?'獲利 ':'虧損 ')+fmtTWD(pnl);pe.className=pnl>=0?'pos':'neg';
  const ce=document.getElementById('total-pct');ce.textContent=sign(pct)+Math.abs(pct).toFixed(2)+'%';ce.className=pnl>=0?'pos':'neg';
  const vals=TABS.map(k=>{let s=0;pf[k].forEach(a=>s+=toTWD(calcAsset(a).current,a.currency));return s;});
  document.getElementById('pie-legend').innerHTML=CAT_NAMES.map((n,i)=>`<span style="display:flex;align-items:center;gap:4px"><span style="width:9px;height:9px;border-radius:2px;background:${COLORS[i]}"></span>${n} ${total>0?Math.round(vals[i]/total*100):0}%</span>`).join('');
  const ctx=document.getElementById('pie');
  if(pieChart)pieChart.destroy();
  pieChart=new Chart(ctx,{type:'doughnut',data:{labels:CAT_NAMES,datasets:[{data:vals,backgroundColor:COLORS,borderWidth:0}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:d=>' NT$ '+Math.round(d.raw).toLocaleString('zh-TW')}}},cutout:'68%'}});
}

function renderAll(){TABS.forEach(t=>renderList(t));renderTotal();}

// ── Render history ────────────────────────────────────
function renderHistory(){
  // 計算摘要
  let totalBuy=0,totalSell=0,realized=0;
  txHistory.forEach(tx=>{
    const amt=tx.qty*tx.price;
    const amtTWD=toTWD(amt,tx.currency);
    if(tx.type==='buy') totalBuy+=amtTWD;
    else{totalSell+=amtTWD;realized+=(tx.pnl||0);}
  });
  const rEl=document.getElementById('hist-realized');
  rEl.textContent=fmtTWD(realized);
  rEl.className='val '+(realized>=0?'pos':'neg');
  document.getElementById('hist-count').textContent=txHistory.length+' 筆';
  document.getElementById('hist-total-buy').textContent=fmtTWD(totalBuy);
  document.getElementById('hist-total-sell').textContent=fmtTWD(totalSell);

  // 篩選
  let list=[...txHistory].reverse(); // 最新在上
  if(histFilter==='buy') list=list.filter(t=>t.type==='buy');
  else if(histFilter==='sell') list=list.filter(t=>t.type==='sell');
  else if(['stocks','us','crypto'].includes(histFilter)) list=list.filter(t=>t.cat===histFilter);

  const el=document.getElementById('hist-list');
  if(!list.length){el.innerHTML='<div class="hist-empty">尚無交易紀錄<br>點右上角「＋ 新增」開始記錄</div>';return;}

  el.innerHTML=list.map((tx,i)=>{
    const isBuy=tx.type==='buy';
    const uf=tx.cat==='us'||tx.cat==='crypto';
    const amt=tx.qty*tx.price;
    const amtStr=uf?fmtUSD(amt):fmtTWD(amt);
    const fee=tx.fee>0?` · 手續費 ${uf?fmtUSD(tx.fee):fmtTWD(tx.fee)}`:'';
    const pnlStr=!isBuy&&tx.pnl!=null
      ?`<div class="hist-pnl ${tx.pnl>=0?'pos':'neg'}">${sign(tx.pnl)}${uf?fmtUSD(tx.pnl):fmtTWD(tx.pnl)} 損益</div>`:'';
    const catLabel={stocks:'台股',us:'美股',crypto:'加密幣',cash:'現金'}[tx.cat]||tx.cat;
    const realIdx=txHistory.length-1-i; // 原始 index（已 reverse）
    const origIdx=txHistory.findIndex(t=>t.id===tx.id);
    return`<div class="hist-item">
      <div class="hist-badge ${isBuy?'badge-buy':'badge-sell'}">${isBuy?'買':'賣'}</div>
      <div class="hist-info">
        <div class="hist-title">${tx.symbol.toUpperCase()} <span style="font-weight:400;color:var(--text2);font-size:12px">${tx.name||''}</span></div>
        <div class="hist-meta">
          ${catLabel} · ${tx.qty} 股/個 × ${uf?fmtUSD(tx.price):fmtTWD(tx.price)}<br>
          📅 ${tx.date||'—'}${fee}${tx.note?' · '+tx.note:''}
        </div>
      </div>
      <div class="hist-right">
        <div class="hist-amount">${isBuy?'−':'＋'}${amtStr}</div>
        ${pnlStr}
      </div>
      <button class="hist-del" onclick="deleteTx('${tx.id}')">✕</button>
    </div>`;
  }).join('');
}

function setFilter(f,btn){
  histFilter=f;
  document.querySelectorAll('.filt-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderHistory();
}

// ── Price sync ────────────────────────────────────────
async function syncPrices(){
  if(syncing)return;syncing=true;
  const btn=document.getElementById('sync-btn');
  document.getElementById('sync-icon').className='spin';
  document.getElementById('sync-label').textContent='更新中';
  btn.disabled=true;
  document.getElementById('err-bar').style.display='none';
  try{
    const fx=await fetch(API+'/fx').then(r=>r.json());
    usdtwd=fx.USDTWD||32.5;
    document.getElementById('fx-rate').textContent=usdtwd.toFixed(2);
    const twS=pf.stocks.map(a=>a.symbol+'.TW').join(',');
    if(twS){const r=await fetch(`${API}/price?symbols=${twS}`).then(r=>r.json());Object.entries(r.prices||{}).forEach(([k,v])=>prices[k]=v.price);}
    const usS=pf.us.map(a=>a.symbol).join(',');
    if(usS){const r=await fetch(`${API}/price?symbols=${usS}`).then(r=>r.json());Object.entries(r.prices||{}).forEach(([k,v])=>prices[k]=v.price);}
    const cS=pf.crypto.map(a=>a.symbol).filter(s=>!['USDT','USD','USDC'].includes(s.toUpperCase())).join(',');
    if(cS){const r=await fetch(`${API}/crypto/prices?symbols=${cS}`).then(r=>r.json());Object.entries(r.prices||{}).forEach(([k,v])=>prices[k]=v.price_usd);}
    document.getElementById('last-time').textContent=new Date().toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'});
    renderAll();
  }catch(e){
    const eb=document.getElementById('err-bar');eb.style.display='block';
    eb.textContent='⚠️ 後端連線失敗，Render 冷啟動約需 30 秒，請稍後再試。';
    renderAll();
  }
  syncing=false;btn.disabled=false;
  document.getElementById('sync-icon').className='';
  document.getElementById('sync-icon').textContent='↻';
  document.getElementById('sync-label').textContent='更新';
}

// ── Page / Tab switch ─────────────────────────────────
function switchPage(p){
  currentPage=p;
  document.querySelectorAll('.page').forEach(el=>el.classList.remove('active'));
  document.getElementById('page-'+p).classList.add('active');
  document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active'));
  document.getElementById('nav-'+p).classList.add('active');
  if(p==='history')renderHistory();
}

function switchTab(tab){
  currentTab=tab;
  document.querySelectorAll('.tab').forEach((b,i)=>b.classList.toggle('active',TABS[i]===tab));
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById('sec-'+tab).classList.add('active');
}

function handleNavAdd(){
  if(currentPage==='history') openTxModal();
  else openAssetModal(currentTab);
}

// ── Asset modal ───────────────────────────────────────
function openAssetModal(type){
  currentTab=type;
  const titles={stocks:'新增台股/ETF',us:'新增美股',crypto:'新增加密幣',cash:'新增現金/存款'};
  const hints={stocks:'台股代號，例如：2330、0050',us:'美股代號，例如：AAPL、VOO',crypto:'幣種代號，例如：BTC、ETH、OKB',cash:'填 TWD / USD / USDT'};
  document.getElementById('asset-modal-title').textContent=titles[type];
  document.getElementById('a-sym-hint').textContent=hints[type];
  document.getElementById('a-currency').value=type==='us'?'USD':type==='crypto'?'USDT':'TWD';
  ['a-symbol','a-name','a-qty','a-cost','a-note'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('modal-asset').classList.add('open');
  setTimeout(()=>document.getElementById('a-symbol').focus(),300);
}

function saveAsset(){
  const sym=document.getElementById('a-symbol').value.trim().toUpperCase();
  const name=document.getElementById('a-name').value.trim();
  const qty=parseFloat(document.getElementById('a-qty').value)||0;
  const cost=parseFloat(document.getElementById('a-cost').value)||0;
  const currency=document.getElementById('a-currency').value;
  const note=document.getElementById('a-note').value.trim();
  if(!sym){alert('請輸入代號');return;}
  if(qty<=0){alert('請輸入正確的數量');return;}
  pf[currentTab].push({symbol:sym,name,qty,cost,currency,note});
  scheduleSave();closeModal('modal-asset');renderAll();syncPrices();
}

function removeAsset(type,idx){
  if(!confirm(`確定刪除「${pf[type][idx].symbol}」？`))return;
  pf[type].splice(idx,1);scheduleSave();renderAll();
}

// ── Transaction modal ─────────────────────────────────
function openTxModal(){
  txType='buy';
  document.getElementById('tx-buy-btn').classList.add('active');
  document.getElementById('tx-sell-btn').classList.remove('active');
  // 預設今天日期
  document.getElementById('t-date').value=new Date().toISOString().slice(0,10);
  ['t-symbol','t-name','t-qty','t-price','t-fee','t-note'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('t-cat').value='stocks';
  document.getElementById('t-currency').value='TWD';
  document.getElementById('modal-tx').classList.add('open');
  setTimeout(()=>document.getElementById('t-symbol').focus(),300);
}

function setTxType(t){
  txType=t;
  document.getElementById('tx-buy-btn').classList.toggle('active',t==='buy');
  document.getElementById('tx-sell-btn').classList.toggle('active',t==='sell');
}

function saveTx(){
  const sym=document.getElementById('t-symbol').value.trim().toUpperCase();
  const name=document.getElementById('t-name').value.trim();
  const qty=parseFloat(document.getElementById('t-qty').value)||0;
  const price=parseFloat(document.getElementById('t-price').value)||0;
  const currency=document.getElementById('t-currency').value;
  const date=document.getElementById('t-date').value;
  const fee=parseFloat(document.getElementById('t-fee').value)||0;
  const note=document.getElementById('t-note').value.trim();
  const cat=document.getElementById('t-cat').value;
  if(!sym){alert('請輸入代號');return;}
  if(qty<=0||price<=0){alert('請輸入正確的數量和單價');return;}

  // 計算損益（賣出時，比對同代號最近買入的加權平均成本）
  let pnl=null;
  if(txType==='sell'){
    const buys=txHistory.filter(t=>t.type==='buy'&&t.symbol===sym&&t.cat===cat);
    if(buys.length>0){
      const avgCost=buys.reduce((s,t)=>s+t.price*t.qty,0)/buys.reduce((s,t)=>s+t.qty,0);
      pnl=toTWD((price-avgCost)*qty,currency)-toTWD(fee,currency);
    }
  }

  const tx={id:Date.now().toString(),type:txType,cat,symbol:sym,name,qty,price,currency,date,fee,note,pnl};
  txHistory.push(tx);
  scheduleSave();closeModal('modal-tx');renderHistory();
}

function deleteTx(id){
  if(!confirm('確定刪除此筆紀錄？'))return;
  txHistory=txHistory.filter(t=>t.id!==id);
  scheduleSave();renderHistory();
}

function closeModal(id){document.getElementById(id).classList.remove('open');}

['modal-asset','modal-tx'].forEach(id=>{
  document.getElementById(id).addEventListener('click',e=>{if(e.target===document.getElementById(id))closeModal(id);});
});

init();
</script>
